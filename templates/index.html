<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Spam Detection System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h1>📩 SMS Spam Detection System</h1>

<p class="subtitle">
AI-powered Machine Learning model to detect Spam and Legitimate SMS messages.
</p>
    <form action="/predict" method="POST">

        <textarea
    name="message"
    placeholder="Type or paste your SMS here..."
    required>{{ message if message else "" }}</textarea>

        <button type="submit">Predict</button>

    </form>

    {% if prediction %}
<div class="result {% if 'Spam' in prediction %}spam{% else %}ham{% endif %}">
    <h2>{{ prediction }}</h2>
</div>
{% endif %}
{% if confidence %}
<div class="confidence">
    <h3>Confidence: {{ confidence }}%</h3>
</div>
{% endif %}
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
